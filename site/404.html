<script>
  (function(){
    var path = window.location.pathname;
    var base = '/duecodedocs';
    if (path.indexOf(base) === 0) path = path.slice(base.length) || '/';
    if (path !== '/404.html' && path !== '/') {
      sessionStorage.setItem('__duecode_redirect', path);
    }
    window.location.replace(base + '/');
  })();
</script>
